name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  TOKIMO_LIB_VERSION: "1.1.10"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd ui && pnpm install --no-frozen-lockfile && pnpm build
      - name: Download tokimo-lib
        shell: bash
        run: |
          mkdir -p bin/tokimo-lib/current
          curl -sL "https://github.com/tokimo-lab/tokimo-lib/releases/download/v${{ env.TOKIMO_LIB_VERSION }}/tokimo-lib-linux-x86_64.tar.zst" | tar --zstd -xf - -C bin/tokimo-lib/current
          echo "TOKIMO_DEP_LIBVIPS_DIR=${{ github.workspace }}/bin/tokimo-lib/current" >> "$GITHUB_ENV"
          echo "FFMPEG_LIBS_DIR=${{ github.workspace }}/bin/tokimo-lib/current/lib" >> "$GITHUB_ENV"
          echo "FFMPEG_INCLUDE_DIR=${{ github.workspace }}/bin/tokimo-lib/current/include" >> "$GITHUB_ENV"
          echo "FFMPEG_PKG_CONFIG_PATH=${{ github.workspace }}/bin/tokimo-lib/current/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${{ github.workspace }}/bin/tokimo-lib/current/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
      - run: cargo build --bins --tests
      - run: cargo test --bins

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd ui && pnpm install --no-frozen-lockfile && pnpm build
      - name: Download tokimo-lib
        shell: bash
        run: |
          mkdir -p bin/tokimo-lib/current
          curl -sL "https://github.com/tokimo-lab/tokimo-lib/releases/download/v${{ env.TOKIMO_LIB_VERSION }}/tokimo-lib-linux-x86_64.tar.zst" | tar --zstd -xf - -C bin/tokimo-lib/current
          echo "TOKIMO_DEP_LIBVIPS_DIR=${{ github.workspace }}/bin/tokimo-lib/current" >> "$GITHUB_ENV"
          echo "FFMPEG_LIBS_DIR=${{ github.workspace }}/bin/tokimo-lib/current/lib" >> "$GITHUB_ENV"
          echo "FFMPEG_INCLUDE_DIR=${{ github.workspace }}/bin/tokimo-lib/current/include" >> "$GITHUB_ENV"
          echo "FFMPEG_PKG_CONFIG_PATH=${{ github.workspace }}/bin/tokimo-lib/current/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${{ github.workspace }}/bin/tokimo-lib/current/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
      - run: cargo fmt --all -- --check
      - run: cargo clippy --bins --tests -- -D warnings
